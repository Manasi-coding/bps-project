controller_manager:
  ros__parameters:
    update_rate: 100 # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Simplest possible controller for a "can I move one joint" smoke
    # test: publish a Float64MultiArray of target positions in joint
    # order and it drives them directly, no trajectory/timing involved.
    # This is deliberately NOT the joint_trajectory_controller MoveIt2
    # will eventually need (that's a later step) -- this is only for
    # proving the Gazebo <-> ros2_control <-> controller_manager wiring
    # itself works.
    forward_position_controller:
      type: forward_command_controller/ForwardCommandController
    gripper_position_controller:
      type: forward_command_controller/ForwardCommandController

joint_state_broadcaster:
  ros__parameters:
    joints:
      - fer_joint1
      - fer_joint2
      - fer_joint3
      - fer_joint4
      - fer_joint5
      - fer_joint6
      - fer_joint7
      - fer_finger_joint1
      - fer_finger_joint2

forward_position_controller:
  ros__parameters:
    joints:
      - fer_joint1
      - fer_joint2
      - fer_joint3
      - fer_joint4
      - fer_joint5
      - fer_joint6
      - fer_joint7
    interface_name: position
gripper_position_controller:
  ros__parameters:
    joints:
      - fer_finger_joint1
      - fer_finger_joint2
    interface_name: position
